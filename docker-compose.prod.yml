services:
  database:
    image: mongo:latest

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - DATABASE=${DATABASE}
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend
