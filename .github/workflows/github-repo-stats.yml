name: github-repo-stats

on:
  schedule:
    - cron: "50 23 * * *"
  workflow_dispatch: # This lets you start it manually!

jobs:
  j1:
    name: github-repo-stats
    runs-on: ubuntu-latest
    steps:
      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@RELEASE
        with:
          repository: Saadbarki/nexora-admin
          databranch: github-repo-stats
          ghtoken: ${{ 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 }}
